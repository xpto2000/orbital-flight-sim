<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight Dynamics Simulator | Mission Control</title>
    <style>
        /* General UI Layout & Color Palette */
        :root { 
            --accent-primary: #3498db; /* Professional Blue */
            --bg-main: #0b0d17; 
            --bg-card: #161b22; 
            --text-white: #ffffff; 
            --log-success: #238636; 
        }
        
        body { 
            background: var(--bg-main); 
            color: var(--text-white); 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Dashboard Header */
        .header { 
            border-bottom: 2px solid var(--accent-primary); 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 10px; 
        }

        /* 3-Column Interface Grid */
        .grid { 
            display: grid; 
            grid-template-columns: 350px 1fr 320px; 
            gap: 20px; 
            height: calc(100vh - 120px); 
        }

        /* Container for Telemetry and Manual Overrides */
        .card { 
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: 4px; 
            border: 1px solid #30363d; 
            display: flex; 
            flex-direction: column; 
        }

        .stat-label { color: #a1a1a1; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: bold; font-family: monospace; margin-bottom: 12px; display: block;}
        
        /* Control Interface Section */
        .control-section { margin-top: 5px; border-top: 1px solid #333; padding-top: 10px; }
        
        input[type=range] { width: 100%; accent-color: var(--accent-primary); margin-bottom: 8px; cursor: pointer; }
        input:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .val-tag { float: right; color: white; font-family: monospace; }
        
        /* Mission State Button Styling */
        button { border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%; transition: 0.3s; color: white; margin-bottom: 5px; text-transform: uppercase; }
        button.ready { background: #238636; } 
        button.low-power { background: #d29922; cursor: not-allowed; } 
        button.flying { background: #e74c3c; } 
        button.countdown { background: #ffffff; color: #000; } 

        /* Sequence Log */
        #log-container { flex-grow: 1; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.75rem; background: #000; padding: 10px; border: 1px solid #333; color: #ccc; }
        
        /* Dynamic Trajectory Canvas */
        #chart-container { position: relative; flex-grow: 1; background: #000; border: 1px solid #333; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #mission-clock { color: var(--accent-primary); font-family: monospace; font-size: 1.5rem; }
    </style>
</head>
<body>

    <!-- Main System Header -->
    <div class="header">
        <h1>ORBITAL // <span style="font-weight: 200;">FLIGHT DYNAMICS SIM</span></h1>
        <div id="mission-clock">T- 00:00:10</div>
    </div>

    <div class="grid">
        <!-- Telemetry Data Column -->
        <div class="card">
            <div>
                <span class="stat-label">Altitude (km)</span>
                <span id="alt" class="stat-value">0.000</span>
                <span class="stat-label">Velocity (m/s)</span>
                <span id="vel" class="stat-value">0</span>
                <span class="stat-label">Fuel Remaining</span>
                <span id="fuel-display" class="stat-value">100%</span>
                <span class="stat-label">TWR Analysis</span>
                <span id="twr-display" class="stat-value">0.00</span>
            </div>

            <div class="control-section">
                <!-- Configurable Variables -->
                <span class="stat-label">Thrust (MN) <span class="val-tag" id="thrust-val">8.5</span></span>
                <input type="range" id="thrust-input" min="1.0" max="15.0" step="0.1" value="8.5">
                
                <span class="stat-label">Fuel Load (T) <span class="val-tag" id="fuel-val">270</span></span>
                <input type="range" id="fuel-input" min="10" max="800" step="10" value="270">
                
                <span class="stat-label">Structural Mass (T) <span class="val-tag" id="dry-val">23</span></span>
                <input type="range" id="dry-input" min="1" max="200" value="23">
                
                <button id="main-btn" onclick="handleButtonClick()">START COUNTDOWN</button>
            </div>
        </div>

        <!-- Trajectory Visualization -->
        <div class="card"><div id="chart-container"><canvas id="flightCanvas"></canvas></div></div>

        <!-- Mission Sequence Log -->
        <div class="card">
            <span class="stat-label" style="margin-bottom: 10px;">Mission Event Log</span>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        /* Simulation Constants & State Tracking */
        let alt = 0, vel = 0, fuelKg = 0, initFuelKg = 0, time = -10;
        let history = [], maxAlt = 20, state = "PRE"; 
        const canvas = document.getElementById('flightCanvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('log-container');

        /* Atmospheric Constants for Environmental Density Modeling */
        const layers = [
            { name: "TROPOSPHERE", start: 0, end: 12, color: "rgba(0, 100, 255, 0.1)" },
            { name: "STRATOSPHERE", start: 12, end: 50, color: "rgba(0, 50, 200, 0.1)" },
            { name: "MESOSPHERE", start: 50, end: 85, color: "rgba(50, 0, 150, 0.1)" },
            { name: "THERMOSPHERE", end: 85, color: "rgba(100, 0, 100, 0.1)" }
        ];

        /* Internal Logging Mechanism */
        function addLog(msg) {
            const entry = document.createElement('div');
            entry.style.marginBottom = "5px";
            entry.innerHTML = `[${document.getElementById('mission-clock').innerText}] ${msg}`;
            logBox.prepend(entry);
        }

        /* Primary Action Controller: Preflight -> Countdown -> Flying */
        function handleButtonClick() {
            const thrustMN = parseFloat(document.getElementById('thrust-input').value);
            const fuelT = parseFloat(document.getElementById('fuel-input').value);
            const dryT = parseFloat(document.getElementById('dry-input').value);
            const twr = (thrustMN * 1e6) / ((dryT + fuelT) * 1000 * 9.81);

            if (state === "PRE" && twr > 1) {
                state = "COUNT";
                addLog("COUNTDOWN SEQUENCE INITIATED");
            } else if (state === "FLY") {
                location.reload(); // Global state reset
            }
        }

        /* Resizing Logic for Trajectory Canvas */
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        /* MAIN SIMULATION LOOP (Runs at 60fps) */
        function update() {
            const dt = 1/60; // Delta-time based on 60Hz tick rate
            const tInput = document.getElementById('thrust-input');
            const fInput = document.getElementById('fuel-input');
            const dInput = document.getElementById('dry-input');
            const btn = document.getElementById('main-btn');

            const thrustMN = parseFloat(tInput.value);
            const fuelT = parseFloat(fInput.value);
            const dryT = parseFloat(dInput.value);

            // Interface Data Reflection
            document.getElementById('thrust-val').innerText = thrustMN.toFixed(1);
            document.getElementById('fuel-val').innerText = fuelT;
            document.getElementById('dry-val').innerText = dryT;

            // Compute Instantaneous Mass Dynamics: used sliders for PRE, real fuelKg for FLY
            const currentTotalMassKg = (state === "FLY") ? (dryT * 1000 + fuelKg) : (dryT + fuelT) * 1000;
            const twr = (thrustMN * 1e6) / (currentTotalMassKg * 9.81);
            document.getElementById('twr-display').innerText = twr.toFixed(2);

            /* Mission State Controller */
            if (state === "PRE") {
                if (twr <= 1) {
                    btn.className = "low-power";
                    btn.innerText = "LOW TWR: INCREASE POWER";
                } else {
                    btn.className = "ready";
                    btn.innerText = "START COUNTDOWN";
                }
            } else if (state === "COUNT") {
                time += dt;
                btn.className = "countdown";
                btn.innerText = "T- " + Math.abs(Math.floor(time)).toString().padStart(2, '0');
                if (time >= 0) {
                    state = "FLY";
                    initFuelKg = fuelT * 1000;
                    fuelKg = initFuelKg;
                    fInput.disabled = true; // Lock configuration on ignition
                    addLog("IGNITION CONFIRMED", true);
                }
            } else if (state === "FLY") {
                time += dt;
                btn.innerText = "RESET SYSTEM";
                btn.className = "flying";

                /* Environmental Physics Simulation (Standard Drag Equation) */
                const thrustN = (fuelKg > 0) ? (thrustMN * 1e6) : 0;
                const rho = 1.225 * Math.exp(-alt / 8.5); // Atmospheric density drop-off
                const dragN = 0.5 * rho * Math.pow(vel, 2) * 0.4 * 20; // Aero Drag
                
                /* Newtonian Integration: a = (F - W - D) / m */
                const acc = (thrustN - (currentTotalMassKg * 9.81) - (vel > 0 ? dragN : 0)) / currentTotalMassKg;
                vel += acc * dt;
                alt += (vel * dt) / 1000;
                
                // Mass Flow Management (Constant Isp Model ~311s)
                if (fuelKg > 0) {
                    const mdot = (thrustMN * 1e6) / (311 * 9.81);
                    fuelKg -= mdot * dt;
                } else fuelKg = 0;

                // Collision detection logic
                if (alt <= 0 && time > 5) { addLog("MISSION TERMINATED: IMPACT"); state = "PRE"; }
            }

            /* Telemetry Display Update */
            document.getElementById('alt').innerText = alt.toFixed(3);
            document.getElementById('vel').innerText = Math.floor(vel);
            document.getElementById('fuel-display').innerText = (state === "FLY") ? Math.max(0, (fuelKg/initFuelKg)*100).toFixed(1) + "%" : "100%";
            
            // Format Mission Clock
            const sign = time < 0 ? "T-" : "T+";
            const abs = Math.abs(Math.floor(time));
            document.getElementById('mission-clock').innerText = `${sign} ${Math.floor(abs/60).toString().padStart(2,'0')}:${(abs%60).toString().padStart(2,'0')}`;

            // Adjust Visual Zoom based on altitude milestones
            if (alt > maxAlt * 0.7) maxAlt *= 1.1;
            if (state === "FLY") history.push(alt);

            /* Rendering Interface: Canvas Logic */
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Render Atmosphere Layers
            layers.forEach(l => {
                if (l.start < maxAlt) {
                    const yTop = canvas.height - (Math.min(l.end, maxAlt) / maxAlt * canvas.height);
                    const yBottom = canvas.height - (l.start / maxAlt * canvas.height);
                    ctx.fillStyle = l.color;
                    ctx.fillRect(0, yTop, canvas.width, Math.max(0, yBottom - yTop));
                    ctx.fillStyle = "rgba(255,255,255,0.4)";
                    ctx.font = "10px monospace";
                    ctx.fillText(l.name, 10, yTop + 15);
                }
            });

            // Draw Dynamic Trajectory
            if (history.length > 1) {
                ctx.beginPath(); 
                ctx.strokeStyle = "#e41e26"; 
                ctx.lineWidth = 3;
                history.forEach((pt, i) => {
                    const x = (i / history.length) * canvas.width;
                    const y = canvas.height - (pt / maxAlt * canvas.height);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();
            }
            requestAnimationFrame(update);
        }

        // Initialize Application
        window.addEventListener('resize', resize);
        resize();
        update();
    </script>
</body>
</html>
